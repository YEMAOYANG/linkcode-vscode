<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>LinkCode — 登录 / 注册</title>
<style>
:root {
  --bg-app: #0f0f0f;
  --bg-surface: #141414;
  --bg-elevated: #1c1c1c;
  --bg-hover: #232323;
  --bg-active: #2a2a2a;
  --bg-border: #2e2e2e;
  --accent: #7c3aed;
  --accent-hover: #6d28d9;
  --accent-subtle: rgba(124,58,237,0.12);
  --accent-text: #a78bfa;
  --text-primary: #e2e2e2;
  --text-secondary: #888888;
  --text-tertiary: #555555;
  --green: #22c55e;
  --red: #ef4444;
  --yellow: #f59e0b;
  --blue: #3b82f6;
  --font-ui: -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --font-code: 'Cascadia Code', 'JetBrains Mono', 'Fira Code', monospace;
  --radius-sm: 4px;
  --radius-md: 6px;
  --radius-lg: 8px;
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
  --duration-fast: 120ms;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  font-family: var(--font-ui); font-size: 13px; line-height: 1.5;
  color: var(--text-primary); background: var(--bg-app); width: 100%; height: 100%; overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* VS Code Webview feel */
.login-page {
  width: 100%; height: 100vh; display: flex; flex-direction: column;
  background: var(--bg-app);
}
.login-titlebar {
  height: 36px; background: var(--bg-surface); display: flex; align-items: center;
  padding: 0 12px; gap: 8px; flex-shrink: 0; border-bottom: 1px solid var(--bg-border);
}
.titlebar-dot { width: 12px; height: 12px; border-radius: 50%; }
.titlebar-dot.close { background: #ff5f57; }
.titlebar-dot.minimize { background: #ffbd2e; }
.titlebar-dot.maximize { background: #28c840; }
.titlebar-title { flex: 1; text-align: center; font-size: 12px; color: var(--text-tertiary); }

.login-body {
  flex: 1; display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}

/* Background grid effect */
.bg-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(124,58,237,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(124,58,237,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
}
.bg-glow {
  position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%);
  width: 600px; height: 600px; border-radius: 50%;
  background: radial-gradient(circle, rgba(124,58,237,0.08) 0%, transparent 70%);
  pointer-events: none;
}

/* Login Card */
.login-card {
  position: relative; z-index: 1;
  width: 400px; background: var(--bg-surface);
  border: 1px solid var(--bg-border); border-radius: 12px;
  padding: 40px 32px; box-shadow: 0 16px 64px rgba(0,0,0,0.4);
  animation: cardIn 0.5s var(--ease);
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(16px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* Logo */
.login-logo {
  display: flex; flex-direction: column; align-items: center; margin-bottom: 32px;
}
.logo-icon {
  width: 56px; height: 56px; border-radius: 14px;
  background: linear-gradient(135deg, var(--accent), #9333ea);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 16px; box-shadow: 0 4px 24px rgba(124,58,237,0.3);
}
.logo-icon svg { color: #fff; }
.logo-text { font-size: 22px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.5px; }
.logo-text span { color: var(--accent-text); }
.logo-subtitle { font-size: 12px; color: var(--text-tertiary); margin-top: 4px; }

/* Tab Switch */
.login-tabs {
  display: flex; gap: 0; margin-bottom: 24px; border-bottom: 1px solid var(--bg-border);
}
.login-tab {
  flex: 1; padding: 10px 0; text-align: center; font-size: 13px; font-weight: 500;
  color: var(--text-tertiary); cursor: pointer; border-bottom: 2px solid transparent;
  transition: all var(--duration-fast) var(--ease);
}
.login-tab:hover { color: var(--text-secondary); }
.login-tab.active { color: var(--accent-text); border-bottom-color: var(--accent); }

/* Form */
.form-group { margin-bottom: 16px; }
.form-label {
  display: block; font-size: 12px; font-weight: 500;
  color: var(--text-secondary); margin-bottom: 6px;
}
.form-input {
  width: 100%; padding: 10px 12px; background: var(--bg-elevated);
  border: 1px solid var(--bg-border); border-radius: var(--radius-md);
  color: var(--text-primary); font-size: 13px; font-family: var(--font-ui);
  outline: none; transition: border-color var(--duration-fast) var(--ease);
}
.form-input:focus { border-color: var(--accent); }
.form-input::placeholder { color: var(--text-tertiary); }

.input-with-btn {
  display: flex; gap: 8px;
}
.input-with-btn .form-input { flex: 1; }
.send-code-btn {
  padding: 0 16px; background: var(--bg-elevated); border: 1px solid var(--bg-border);
  border-radius: var(--radius-md); color: var(--accent-text); font-size: 12px;
  font-weight: 500; cursor: pointer; white-space: nowrap;
  transition: all var(--duration-fast) var(--ease); font-family: var(--font-ui);
}
.send-code-btn:hover { background: var(--bg-hover); border-color: var(--accent); }

.phone-input-wrap {
  display: flex; align-items: center; gap: 0;
  background: var(--bg-elevated); border: 1px solid var(--bg-border);
  border-radius: var(--radius-md); overflow: hidden;
  transition: border-color var(--duration-fast);
}
.phone-input-wrap:focus-within { border-color: var(--accent); }
.phone-prefix {
  padding: 10px 12px; border-right: 1px solid var(--bg-border);
  font-size: 13px; color: var(--text-secondary); background: var(--bg-surface);
  cursor: pointer; user-select: none; display: flex; align-items: center; gap: 4px;
}
.phone-prefix::after { content: '▾'; font-size: 9px; color: var(--text-tertiary); }
.phone-input-wrap input {
  flex: 1; padding: 10px 12px; background: transparent; border: none;
  color: var(--text-primary); font-size: 13px; outline: none; font-family: var(--font-ui);
}
.phone-input-wrap input::placeholder { color: var(--text-tertiary); }

.login-btn {
  width: 100%; padding: 11px 0; background: var(--accent); border: none;
  border-radius: var(--radius-md); color: #fff; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: all var(--duration-fast) var(--ease);
  font-family: var(--font-ui); margin-top: 8px;
}
.login-btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
.login-btn:active { transform: scale(0.98); }

/* Divider */
.login-divider {
  display: flex; align-items: center; gap: 12px; margin: 20px 0;
}
.login-divider::before, .login-divider::after {
  content: ''; flex: 1; height: 1px; background: var(--bg-border);
}
.login-divider span { font-size: 11px; color: var(--text-tertiary); }

/* Alt Login */
.alt-login {
  display: flex; justify-content: center; gap: 16px;
}
.alt-login-btn {
  width: 44px; height: 44px; border-radius: 10px;
  background: var(--bg-elevated); border: 1px solid var(--bg-border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all var(--duration-fast) var(--ease);
  color: var(--text-secondary);
}
.alt-login-btn:hover { border-color: var(--accent); background: var(--bg-hover); color: var(--text-primary); }

/* Terms */
.login-terms {
  margin-top: 20px; text-align: center; font-size: 11px; color: var(--text-tertiary); line-height: 1.6;
}
.login-terms a { color: var(--accent-text); text-decoration: none; }
.login-terms a:hover { text-decoration: underline; }

/* Email form (hidden by default) */
.email-form { display: none; }
.email-form.active { display: block; }
.phone-form { display: block; }
.phone-form.hidden { display: none; }

/* Back to Index */
.back-to-index {
  position: fixed; top: 42px; right: 12px; z-index: 9999;
  display: flex; align-items: center; gap: 6px;
  padding: 6px 12px; background: rgba(28,28,28,0.9);
  border: 1px solid #2e2e2e; border-radius: 6px;
  color: #a78bfa; font-size: 11px; font-weight: 500;
  cursor: pointer; backdrop-filter: blur(8px);
  transition: all 0.15s var(--ease); text-decoration: none;
  font-family: var(--font-ui); opacity: 0.7;
}
.back-to-index:hover { opacity: 1; background: rgba(44,44,44,0.95); border-color: #7c3aed; text-decoration: none; }
</style>
</head>
<body>
<a href="index.html" class="back-to-index">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
  导航页
</a>

<div class="login-page">
  <div class="login-titlebar">
    <div class="titlebar-dot close"></div><div class="titlebar-dot minimize"></div><div class="titlebar-dot maximize"></div>
    <div class="titlebar-title">LinkCode — 欢迎使用</div>
    <div style="width:36px"></div>
  </div>

  <div class="login-body">
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>

    <div class="login-card">
      <!-- Logo -->
      <div class="login-logo">
        <div class="logo-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/>
            <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/>
          </svg>
        </div>
        <div class="logo-text">Link<span>Code</span></div>
        <div class="logo-subtitle">VS Code AI 多模型编程助手</div>
      </div>

      <!-- Login Tabs -->
      <div class="login-tabs">
        <div class="login-tab active" onclick="switchTab('phone')">手机号登录</div>
        <div class="login-tab" onclick="switchTab('email')">邮箱登录</div>
      </div>

      <!-- Phone Login Form -->
      <div class="phone-form" id="phoneForm">
        <div class="form-group">
          <label class="form-label">手机号</label>
          <div class="phone-input-wrap">
            <div class="phone-prefix">+86</div>
            <input type="tel" placeholder="请输入手机号" maxlength="11">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">验证码</label>
          <div class="input-with-btn">
            <input class="form-input" type="text" placeholder="请输入 6 位验证码" maxlength="6">
            <button class="send-code-btn">发送验证码</button>
          </div>
        </div>
        <button class="login-btn" onclick="window.location.href='03-onboarding-step1.html'">登录 / 注册</button>
      </div>

      <!-- Email Login Form -->
      <div class="email-form" id="emailForm">
        <div class="form-group">
          <label class="form-label">邮箱地址</label>
          <input class="form-input" type="email" placeholder="name@example.com">
        </div>
        <div class="form-group">
          <label class="form-label">密码</label>
          <input class="form-input" type="password" placeholder="请输入密码">
        </div>
        <div style="display:flex; justify-content:flex-end; margin-bottom:8px;">
          <a href="#" style="font-size:11px; color:var(--accent-text); text-decoration:none;">忘记密码？</a>
        </div>
        <button class="login-btn" onclick="window.location.href='03-onboarding-step1.html'">登录</button>
      </div>

      <!-- Divider -->
      <div class="login-divider"><span>其他登录方式</span></div>

      <!-- Alt Login Methods -->
      <div class="alt-login">
        <div class="alt-login-btn" title="微信登录">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8.691 2.188C3.891 2.188 0 5.476 0 9.53c0 2.212 1.17 4.203 3.002 5.55a.59.59 0 01.213.665l-.39 1.48c-.019.07-.048.141-.048.213 0 .163.13.295.29.295a.326.326 0 00.167-.054l1.903-1.114a.864.864 0 01.717-.098 10.16 10.16 0 002.837.403c.276 0 .543-.027.811-.05-.857-2.578.157-4.972 1.932-6.446 1.703-1.415 3.882-1.98 5.853-1.838-.576-3.583-4.196-6.348-8.596-6.348zM5.785 5.991c.642 0 1.162.529 1.162 1.18a1.17 1.17 0 01-1.162 1.178A1.17 1.17 0 014.623 7.17c0-.651.52-1.18 1.162-1.18zm5.813 0c.642 0 1.162.529 1.162 1.18a1.17 1.17 0 01-1.162 1.178 1.17 1.17 0 01-1.162-1.178c0-.651.52-1.18 1.162-1.18zm5.34 2.867c-1.797-.052-3.746.512-5.28 1.786-1.72 1.428-2.687 3.72-1.78 6.22.942 2.453 3.666 4.229 6.884 4.229.826 0 1.622-.12 2.361-.336a.722.722 0 01.598.082l1.584.926a.272.272 0 00.14.045c.134 0 .24-.11.24-.245 0-.06-.024-.12-.04-.177l-.327-1.233a.49.49 0 01.177-.554C23.212 18.637 24 17.07 24 15.334c0-3.385-3.274-6.231-7.062-6.476zm-3.173 2.991c.535 0 .969.44.969.982a.976.976 0 01-.969.983.976.976 0 01-.969-.983c0-.542.434-.982.97-.982zm4.844 0c.535 0 .969.44.969.982a.976.976 0 01-.969.983.976.976 0 01-.969-.983c0-.542.434-.982.97-.982z"/></svg>
        </div>
        <div class="alt-login-btn" title="GitHub 登录">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
        </div>
        <div class="alt-login-btn" title="Google 登录">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        </div>
      </div>

      <!-- Terms -->
      <div class="login-terms">
        登录即表示同意 <a href="#">《服务条款》</a> 和 <a href="#">《隐私政策》</a>
      </div>
    </div>
  </div>
</div>

<script>
function switchTab(type) {
  const tabs = document.querySelectorAll('.login-tab');
  const phoneForm = document.getElementById('phoneForm');
  const emailForm = document.getElementById('emailForm');
  
  tabs.forEach(t => t.classList.remove('active'));
  
  if (type === 'phone') {
    tabs[0].classList.add('active');
    phoneForm.className = 'phone-form';
    emailForm.className = 'email-form';
  } else {
    tabs[1].classList.add('active');
    phoneForm.className = 'phone-form hidden';
    emailForm.className = 'email-form active';
  }
}
</script>
</body>
</html>
